services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketer-backend
    working_dir: /var/www/html
    ports:
      - "8005:8000"
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      DB_CONNECTION: oracle
      DB_HOST: host.docker.internal
      DB_PORT: 1524
      DB_DATABASE: FREEPDB1
      DB_SERVICE_NAME: FREEPDB1
      DB_USERNAME: marketer
      DB_PASSWORD: secret
    command: sh -c "composer install && php artisan migrate --seed --force && php artisan serve --host=0.0.0.0 --port=8000"

  postgres:
    image: postgres:16-alpine
    container_name: marketer-postgress
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: marketer
      POSTGRES_USER: marketer
      POSTGRES_PASSWORD: secret
    volumes:
      - marketer_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketer -d marketer"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  marketer_postgres_data:
